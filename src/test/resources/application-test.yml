spring:
  flyway:
    enabled: false
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
  data:
    redis:
      repositories:
        enabled: false
      host: localhost
      port: 6379

jwt:
  secret: test-jwt-secret-which-is-long-enough-32
